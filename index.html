            background-repeat: no-repeat;
            background-position: center;
            color: transparent;

        .input-area {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .input-box {
            background-color: #40414f;
            border: 1px solid #565869;
            border-radius: 8px;
            width: 100%;
            display: flex;
            padding: 10px 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }

        .input-box button {
            background: transparent;
            border: none;
            color: #acacbe;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .input-box button:hover {
            color: white;
        }

        /* Markdown Table Styles */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
            margin-bottom: 10px;
            background-color: #2a2b32;
            color: #d1d5db;
        }

        th,
        td {
            border: 1px solid #4b5563;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #1f2937;
            color: #f3f4f6;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="messages" id="chat">
            <div class="message daia-message">
                <div class="avatar daia-avatar">D</div>
                <div>
                    <strong class="text-gray-300">DAIA</strong>
                    <div class="mt-2 leading-relaxed">Hola, soy DAIA (Datacom AI Assistant), tu asistente
                        inteligente profesional. Estoy aquí para ayudarte a obtener información precisa sobre facturas,
                        contratos y procesos internos de Datacom. ¿En qué te puedo ayudar hoy?</div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="queryInput"
                    placeholder="Consulta sobre Datacom (Ej. 'Dame las facturas de la empresa X' o 'Resume el contrato Y')..."
                    autocomplete="off">
                <button onclick="sendMessage()" id="sendBtn">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
                        stroke-linejoin="round" height="20" width="20" xmlns="http://www.w3.org/2000/svg">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Cargar Marked.js para renderizar respuestas Markdown y tablas en HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('queryInput');
        const btn = document.getElementById('sendBtn');

        // Usar ruta relativa para que funcione tanto local como en el servidor
        const API_URL = "/chat";

        input.addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // User Message UI
            chat.innerHTML += `
                <div class="message user-message">
                    <div class="avatar user-avatar">U</div>
                    <div>
                        <strong class="text-gray-300">Tú</strong>
                        <div class="mt-2 leading-relaxed">${text}</div>
                    </div>
                </div>`;

            input.value = '';
            btn.innerHTML = '<div class="loading"></div>';
            btn.disabled = true;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });

                const data = await response.json();

                if (response.ok) {
                    const parsedHtml = marked.parse(data.answer);
                    const routingLabel = data.routing === "EXTERNAL" ? 
                        '<span class="bg-blue-900 text-blue-200 px-2 py-0.5 rounded ml-2 text-xs">ChatGPT Free (Externo)</span>' : 
                        '<span class="bg-green-900 text-green-200 px-2 py-0.5 rounded ml-2 text-xs">Conocimiento Interno</span>';

                    chat.innerHTML += `
                        <div class="message daia-message">
                            <div class="avatar daia-avatar">D</div>
                            <div class="w-full">
                                <div class="flex items-center">
                                    <strong class="text-gray-300">DAIA</strong>
                                    ${routingLabel}
                                </div>
                                <div class="mt-2 leading-relaxed">${parsedHtml}</div>
                                <div class="text-xs text-gray-500 mt-2">Fuentes exploradas: ${data.sources.length > 0 ? data.sources.join(', ') : 'Ninguna'}</div>
                            </div>
                        </div>`;
                } else {
                    throw new Error(data.detail || "Error en el servidor");
                }
            } catch (err) {
                chat.innerHTML += `
                    <div class="message daia-message">
                        <div class="avatar daia-avatar" style="background-color: #ef4444;">E</div>
                        <div>
                            <strong class="text-red-400">Error del Sistema</strong>
                            <div class="mt-2 text-red-300">${err.message}. Asegúrate de que el backend (FastAPI) esté corriendo.</div>
                        </div>
                    </div>`;
            }

            btn.innerHTML = '<svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" xmlns="http://www.w3.org/2000/svg"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>

</html>
